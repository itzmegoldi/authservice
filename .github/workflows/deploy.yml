name: Build and Push Docker Image
on:
  push:
    branches:
      - main
jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image API
        run: |
          echo "Building API Image"
          docker build -f build/Dockerfile.api -t ghcr.io/${{ github.repository_owner }}/auth-api:latest .
          docker build -f build/Dockerfile.api -t ghcr.io/${{ github.repository_owner }}/auth-api:${{ github.sha }} .

      - name: Build Image Worker
        run: |
          echo "Building Worker Image"
          docker build -f build/Dockerfile.worker -t ghcr.io/${{ github.repository_owner }}/auth-worker:latest .
          docker build -f build/Dockerfile.worker -t ghcr.io/${{ github.repository_owner }}/auth-worker:${{ github.sha }} .

      - name: Push Image
        run: |
          echo "Pushing Image"
          docker push ghcr.io/${{ github.repository_owner }}/auth-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/auth-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/auth-worker:latest
          docker push ghcr.io/${{ github.repository_owner }}/auth-worker:${{ github.sha }}

