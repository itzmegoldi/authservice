services:
  backend-api:
    build:
      context: ./backend
      dockerfile: build/Dockerfile.api
    container_name: auth-backend-api
    environment:
      APP_ENV: docker
      SERVER_PORT: 8080
      DATABASE_URL: sqlite:////app/data/auth.db
      AUTH_ISSUER: http://localhost:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      AUTH_ADMIN_EMAIL: admin@example.com
      AUTH_ADMIN_PASSWORD: ChangeMe123!
    volumes:
      - auth-db:/app/data
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - authnet

  backend-worker:
    build:
      context: ./backend
      dockerfile: build/Dockerfile.worker
    container_name: auth-backend-worker
    environment:
      APP_ENV: docker
      SERVER_PORT: 8081
      DATABASE_URL: sqlite:////app/data/auth.db
      AUTH_ISSUER: http://backend-api:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      AUTH_ADMIN_EMAIL: admin@example.com
      AUTH_ADMIN_PASSWORD: ChangeMe123!
    volumes:
      - auth-db:/app/data
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      backend-api:
        condition: service_started
    networks:
      - authnet

  frontend:
    build:
      context: ./frontend
    container_name: auth-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-api
    networks:
      - authnet

  kafka:
    image: apache/kafka:4.1.1
    container_name: auth-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - authnet

  redis:
    image: redis:7.4-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - authnet

networks:
  authnet:
    driver: bridge

volumes:
  auth-db:
  kafka-data:
  redis-data:
