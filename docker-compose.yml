services:
  backend-api:
    build:
      context: .
      dockerfile: build/Dockerfile.api
    container_name: auth-backend-api
    env_file:
      - .env
    volumes:
      - auth-db:/app/data
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
    networks:
      - authnet

  backend-worker:
    build:
      context: .
      dockerfile: build/Dockerfile.worker
    container_name: auth-backend-worker
    env_file:
      - .env
    volumes:
      - auth-db:/app/data
    depends_on:
      redis:
        condition: service_started
      backend-api:
        condition: service_started
    networks:
      - authnet

  frontend:
    build:
      context: ./frontend
    container_name: auth-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-api
    networks:
      - authnet

  redis:
    image: redis:7.4-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - authnet

networks:
  authnet:
    driver: bridge

volumes:
  auth-db:
  redis-data:
